<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Botón flotante para activar el sonido */
        #audio-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- El botón que verá la profesora para activar el audio -->
    <button id="audio-btn" onclick="toggleAudio()">🔇 Activar Sonido</button>

    <video id="miVideo" autoplay loop muted playsinline>
        <source src="VIDEOGENO2.mp4?v=2" type="video/mp4">
        Tu navegador no soporta este video.
    </video>

    <script>
        function toggleAudio() {
            var video = document.getElementById("miVideo");
            var btn = document.getElementById("audio-btn");
            
            if (video.muted) {
                video.muted = false;
                btn.innerHTML = "🔊 Silenciar";
            } else {
                video.muted = true;
                btn.innerHTML = "🔇 Activar Sonido";
            }
        }
    </script>

</body>
</html>
